services:
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: compliance_saas
    ports:
      - "3306:3306"
    volumes:
      - compliance_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  web:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: compliance_saas
      DB_USERNAME: root
      DB_PASSWORD: ""
    depends_on:
      db:
        condition: service_healthy
    command: >
      php -S 0.0.0.0:8000 -t public public/index.php

volumes:
  compliance_db_data:
